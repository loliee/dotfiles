---
colors:
  primary:
    background: "#282a36"
    foreground: "#f8f8f2"
    bright_foreground: "#ffffff"
  cursor:
    text: CellBackground
    cursor: CellForeground
  vi_mode_cursor:
    text: CellBackground
    cursor: CellForeground
  search:
    matches:
      foreground: "#44475a"
      background: "#50fa7b"
    focused_match:
      foreground: "#44475a"
      background: "#ffb86c"
  footer_bar:
    background: "#282a36"
    foreground: "#f8f8f2"
  hints:
    start:
      foreground: "#282a36"
      background: "#f1fa8c"
    end:
      foreground: "#f1fa8c"
      background: "#282a36"
  line_indicator:
    foreground: None
    background: None
  selection:
    text: CellForeground
    background: "#44475a"
  normal:
    black: "#21222c"
    red: "#ff5555"
    green: "#50fa7b"
    yellow: "#f1fa8c"
    blue: "#bd93f9"
    magenta: "#ff79c6"
    cyan: "#8be9fd"
    white: "#f8f8f2"
  bright:
    black: "#6272a4"
    red: "#ff6e6e"
    green: "#69ff94"
    yellow: "#ffffa5"
    blue: "#d6acff"
    magenta: "#ff92df"
    cyan: "#a4ffff"
    white: "#ffffff"

font:
  size: 14.0
  normal:
    family: Iosevka Nerd Font
    style: Regular
  bold:
    family: Iosevka Nerd Font
    style: Bold
  italic:
    family: Iosevka Nerd Font
    style: Italic

key_bindings:
  # Fast escape cmd-J
  - { key: J, mods: Command, chars: "\x1B" }
  # ←  ↑  ↓  →
  - { key: H, mods: Control, chars: "\x1b[D" }
  - { key: J, mods: Control, chars: "\x1b[B" }
  - { key: K, mods: Control, chars: "\x1b[A" }
  - { key: L, mods: Control, chars: "\x1b[C}" }

  - { key: H, mods: Alt, chars: "\x5E" }
  - { key: L, mods: Alt, chars: "\x24" }
  - { key: Return, mods: Command, action: ToggleFullscreen }

live_config_reload: true

window:
  startup_mode: Maximized
  decorations: buttonless
  dynamic_padding: true
  option_as_alt: None
  padding:
    x: 5
    y: 5